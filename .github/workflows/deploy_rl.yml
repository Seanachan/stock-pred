name: Deploy RL Daily Trade

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    # 03:00 UTC = 11:00 TW (TW market 09:00-13:30). Buffer for cron jitter.
    - cron: "0 3 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "paper or live"
        required: true
        default: "paper"
        type: choice
        options:
          - paper
          - live

concurrency:
  group: deploy-rl
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          cache-dependency-glob: "requirements.txt"

      - name: Create venv (uv-managed Python 3.12)
        run: uv venv --python 3.12

      - name: Install dependencies
        run: uv pip install -r requirements.txt

      - name: Run deploy
        env:
          ACCOUNT: ${{ secrets.NCKU_ACCOUNT }}
          PASSWORD: ${{ secrets.NCKU_PASSWORD }}
        run: |
          MODE="${{ github.event.inputs.mode || 'live' }}"
          if [ "$MODE" = "live" ]; then
            uv run python -m RL.deploy_rl --live
          else
            uv run python -m RL.deploy_rl --paper
          fi

      - name: Commit state + refreshed CSVs
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy_state.json RL/data/
          if ! git diff --cached --quiet; then
            git commit -m "deploy: state + data $(date -u +%Y-%m-%d)"
            git push
          else
            echo "no changes to commit"
          fi
