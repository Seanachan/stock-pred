name: Deploy RL Daily Trade

on:
  schedule:
    # 03:00 UTC = 11:00 TW (TW market 09:00-13:30). Buffer for cron jitter.
    - cron: '0 3 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'paper or live'
        required: true
        default: 'paper'
        type: choice
        options:
          - paper
          - live

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Run deploy
        env:
          ACCOUNT: ${{ secrets.NCKU_ACCOUNT }}
          PASSWORD: ${{ secrets.NCKU_PASSWORD }}
        run: |
          MODE="${{ github.event.inputs.mode || 'live' }}"
          if [ "$MODE" = "live" ]; then
            python -m RL.deploy_rl --live
          else
            python -m RL.deploy_rl --paper
          fi

      - name: Commit state
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy_state.json
          if ! git diff --cached --quiet; then
            git commit -m "deploy: state $(date -u +%Y-%m-%d)"
            git push
          else
            echo "no state changes to commit"
          fi
