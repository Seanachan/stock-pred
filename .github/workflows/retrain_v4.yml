name: Weekly Retrain v4 LSTM Ensemble (5 seeds)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    # Sunday 01:00 UTC = Sunday 09:00 TW. Daily deploy committed
    # CSVs through Friday close, so training window is fully fresh by then.
    - cron: "0 1 * * 0"
  workflow_dispatch: {}

concurrency:
  group: retrain-v4
  cancel-in-progress: false

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          cache-dependency-glob: "requirements.txt"

      - name: Create venv (uv-managed Python 3.12)
        run: uv venv --python 3.12

      - name: Install dependencies
        run: uv pip install -r requirements.txt

      - name: Train v4 LSTM 5-seed ensemble
        run: |
          uv run python -m RL.dl_train_deploy \
            --epochs 500 \
            --train-recent 500 \
            --window 50 \
            --hidden 32 \
            --max-weight 0.10 \
            --seeds 0,1,2,3,4

      - name: Commit refreshed ensemble
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/dl_v4_seed*.pt
          if ! git diff --cached --quiet; then
            git commit -m "retrain: v4 LSTM 5-seed ensemble $(date -u +%Y-%m-%d)"
            git push
          else
            echo "models unchanged; skipping commit"
          fi
